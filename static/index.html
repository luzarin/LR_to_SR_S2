<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEN2SRLite - Super-Resolución</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #f0fdfa;
            /* light teal background similar to the image vibe */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #1e293b;
        }

        .main-card {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            border-radius: 12px;
        }
    </style>
</head>

<body class="min-h-screen py-10 px-4">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-semibold mb-2">SEN2SRLite</h1>
            <p class="text-gray-600">Super-Resolución de Imágenes GeoTIFF</p>
        </div>

        <!-- Main Container Card -->
        <div class="bg-white p-8 main-card border border-gray-100">
            <h2 class="text-xl font-medium mb-6 text-gray-800 border-b pb-2">Configuración</h2>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <!-- Columna Izquierda -->
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Weights Directory</label>
                        <input type="text" id="weights_dir" value="./SEN2SRLite"
                            class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Input Folder</label>
                        <div class="flex gap-2">
                            <input type="text" id="input_dir" value="./input_10bands_LR"
                                class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                            <button type="button" onclick="loadTifs()"
                                class="bg-indigo-50 text-indigo-600 px-3 py-2 rounded-md hover:bg-indigo-100 transition shadow-sm border border-indigo-200">
                                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Input Filename (<span
                                id="file_count">0</span>)</label>
                        <select id="in_tif" onchange="updateOutName()"
                            class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                            <option value="">Cargando...</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Device Mode</label>
                        <div class="flex items-center gap-2">
                            <select id="device_mode"
                                class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                                <option value="auto">Auto</option>
                                <option value="cuda">CUDA (GPU)</option>
                                <option value="cpu">CPU</option>
                            </select>
                            <span id="gpu_badge"
                                class="px-2 py-1 bg-gray-100 text-gray-600 rounded text-xs whitespace-nowrap hidden border border-gray-200"></span>
                        </div>
                    </div>
                </div>

                <!-- Columna Derecha -->
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Output Folder</label>
                        <input type="text" id="output_dir" value="./output_10bands_SR"
                            class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Output Filename</label>
                        <input type="text" id="out_name"
                            class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>

                    <div class="grid grid-cols-2 gap-4 mt-2">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Factor</label>
                            <input type="number" id="factor" value="4" min="1" max="8"
                                class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Patch Size</label>
                            <input type="number" id="patch" value="128" step="16"
                                class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Padding</label>
                            <input type="number" id="pad" value="4" min="0" max="64"
                                class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Batch Size</label>
                            <input type="number" id="batch" value="7" min="1" max="64"
                                class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Acciones -->
            <div class="flex gap-3 mb-6">
                <button id="btn_run" onclick="runPipeline()"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-md font-medium transition shadow-sm flex items-center justify-center gap-2 flex-grow sm:flex-grow-0 sm:w-40">
                    <i data-lucide="play" class="w-4 h-4"></i> Run
                </button>
                <button id="btn_cancel" onclick="cancelPipeline()"
                    class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-5 py-2.5 rounded-md font-medium transition shadow-sm hidden flex items-center justify-center gap-2">
                    <i data-lucide="x" class="w-4 h-4"></i> Cancel
                </button>
            </div>

            <!-- Progreso y Terminal -->
            <div id="progress_container" class="space-y-3 mb-4 hidden">
                <div class="flex justify-between text-sm font-medium text-gray-600 mb-1">
                    <span>Progreso</span>
                    <span id="progress_pct">0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2.5">
                    <div id="progress_bar" class="bg-teal-500 h-2.5 rounded-full transition-all duration-300"
                        style="width: 0%"></div>
                </div>

                <!-- Badges -->
                <div class="flex gap-2">
                    <span id="status_badge"
                        class="px-2 py-1 bg-green-100 text-green-700 rounded text-xs font-medium border border-green-200">status:
                        idle</span>
                </div>
            </div>

            <!-- Terminal Log -->
            <div class="bg-gray-900 rounded-md p-4 mt-2 relative">
                <button onclick="clearLogs()" class="absolute top-2 right-2 text-gray-400 hover:text-white transition"
                    title="Clear logs">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
                <div id="terminal" class="h-32 overflow-y-auto text-gray-300 font-mono text-xs space-y-1">
                    <div class="text-gray-500">> Ready</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let eventSource = null;

        function logToTerminal(msg, type = "normal") {
            const term = document.getElementById("terminal");
            const div = document.createElement("div");
            div.textContent = `> ${msg}`;
            if (type === "error") div.classList.add("text-red-400");
            if (type === "success") div.classList.add("text-green-400");
            term.appendChild(div);
            term.scrollTop = term.scrollHeight;
        }

        function clearLogs() {
            document.getElementById("terminal").innerHTML = '';
            logToTerminal("Logs cleared.");
        }

        async function loadDeviceInfo() {
            try {
                const res = await fetch("/api/device_info");
                const data = await res.json();
                if (data.cuda_available) {
                    const badge = document.getElementById("gpu_badge");
                    badge.textContent = data.gpu_name;
                    badge.classList.remove("hidden");
                    document.getElementById("device_mode").value = "cuda";
                }
            } catch (e) {
                console.error("No se pudo cargar device_info", e);
            }
        }

        async function loadTifs() {
            const folder = document.getElementById('input_dir').value;
            const select = document.getElementById('in_tif');
            const countSpan = document.getElementById('file_count');

            select.innerHTML = '<option>Loading...</option>';
            logToTerminal(`Leyendo directorio: ${folder}...`);

            try {
                const res = await fetch(`/api/tifs?folder=${encodeURIComponent(folder)}`);
                const data = await res.json();
                select.innerHTML = '';

                if (data.files && data.files.length > 0) {
                    data.files.forEach(f => {
                        const opt = document.createElement('option');
                        opt.value = f;
                        opt.textContent = f;
                        select.appendChild(opt);
                    });
                    countSpan.textContent = data.files.length;
                    logToTerminal(`Encontrados ${data.files.length} archivos TIFF.`);
                    updateOutName();
                } else {
                    select.innerHTML = '<option value="">Sin archivos .tif</option>';
                    countSpan.textContent = "0";
                    logToTerminal("No se encontraron archivos en la carpeta.", "error");
                }
            } catch (error) {
                select.innerHTML = '<option value="">Error al cargar</option>';
                logToTerminal("Error conectado con el servidor.", "error");
            }
        }

        function updateOutName() {
            const select = document.getElementById('in_tif');
            if (select.value) {
                const filename = select.value;
                // Quitamos la extension
                const stem = filename.substring(0, filename.lastIndexOf('.')) || filename;
                document.getElementById('out_name').value = stem + "_SR.tif";
            }
        }

        function cancelPipeline() {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
                logToTerminal("Pipeline cancelado por el usuario.", "error");
                resetButtons();
            }
        }

        function resetButtons() {
            document.getElementById("btn_run").classList.remove("hidden");
            document.getElementById("btn_cancel").classList.add("hidden");
        }

        function runPipeline() {
            const weights_dir = document.getElementById("weights_dir").value;
            const input_dir = document.getElementById("input_dir").value;
            const in_tif_name = document.getElementById("in_tif").value;
            const out_dir = document.getElementById("output_dir").value;
            const out_name = document.getElementById("out_name").value;
            const factor = document.getElementById("factor").value;
            const patch = document.getElementById("patch").value;
            const pad = document.getElementById("pad").value;
            const batch = document.getElementById("batch").value;
            const device = document.getElementById("device_mode").value;

            if (!in_tif_name) {
                logToTerminal("No has seleccionado un archivo de entrada.", "error");
                return;
            }

            // Normalizamos rutas uniendo el dir con el archivo
            // El backend espera el path completo del input
            // Aquí asumimos separador '/' por simplicidad, aunque os.path.join en el backend lo maneja mejor
            const in_tif_path = input_dir.replace(/\/$/, '') + '/' + in_tif_name;

            // Limpiar UI state
            document.getElementById("btn_run").classList.add("hidden");
            document.getElementById("btn_cancel").classList.remove("hidden");
            document.getElementById("progress_container").classList.remove("hidden");
            document.getElementById("progress_bar").style.width = "0%";
            document.getElementById("progress_pct").textContent = "0%";
            document.getElementById("status_badge").textContent = "status: starting";
            document.getElementById("status_badge").className = "px-2 py-1 bg-yellow-100 text-yellow-800 rounded text-xs font-medium border border-yellow-200";

            clearLogs();
            logToTerminal("Iniciando reconstrucción super-resolución...");

            // Construir URL
            const queryParams = new URLSearchParams({
                weights_dir,
                in_tif: in_tif_path,
                out_dir,
                out_name,
                factor,
                patch,
                pad,
                batch,
                device
            });

            const url = `/api/run?${queryParams.toString()}`;

            if (eventSource) eventSource.close();

            eventSource = new EventSource(url);

            eventSource.onmessage = function (e) {
                const data = JSON.parse(e.data);

                if (data.error) {
                    logToTerminal("Error: " + data.error, "error");
                    document.getElementById("status_badge").textContent = "status: error";
                    document.getElementById("status_badge").className = "px-2 py-1 bg-red-100 text-red-800 rounded text-xs font-medium border border-red-200";
                    eventSource.close();
                    resetButtons();
                    return;
                }

                if (data.log) {
                    logToTerminal(data.log);
                }

                if (data.status) {
                    // Actualizar log en caso de que sea un mensaje descriptivo
                    logToTerminal(data.status);
                }

                if (data.progress !== undefined) {
                    const pct = data.progress.toFixed(1);
                    document.getElementById("progress_bar").style.width = pct + "%";
                    document.getElementById("progress_pct").textContent = pct + "%";
                    document.getElementById("status_badge").textContent = "status: running";
                    document.getElementById("status_badge").className = "px-2 py-1 bg-blue-100 text-blue-800 rounded text-xs font-medium border border-blue-200";
                }

                if (data.stage) {
                    if (data.stage === "completed") {
                        document.getElementById("status_badge").textContent = "status: completed";
                        document.getElementById("status_badge").className = "px-2 py-1 bg-green-100 text-green-800 rounded text-xs font-medium border border-green-200";
                        document.getElementById("progress_bar").style.width = "100%";
                        document.getElementById("progress_pct").textContent = "100%";
                        eventSource.close();
                        resetButtons();
                        logToTerminal("Proceso exitoso.", "success");
                    }
                }
            };

            eventSource.onerror = function (e) {
                logToTerminal("Se perdió la conexión con el servidor.", "error");
                document.getElementById("status_badge").textContent = "status: connection lost";
                document.getElementById("status_badge").className = "px-2 py-1 bg-red-100 text-red-800 rounded text-xs font-medium border border-red-200";
                eventSource.close();
                resetButtons();
            };
        }

        // Init
        window.addEventListener('DOMContentLoaded', () => {
            loadDeviceInfo();
            loadTifs();
        });
    </script>

</body>

</html>
