<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEN2SRLite - Super-Resolución</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #f4f8fb;
            --card: #ffffff;
            --ink: #111827;
            --line: #d1d5db;
            --primary: #1a2b6b;
            --primary-hover: #111d4e;
            --primary-soft: #dce4f5;
            --primary-soft-hover: #c3d0ee;
            --terminal: #1e293b;
        }

        body {
            background: radial-gradient(1200px 600px at 50% -200px, #ffffff 5%, var(--bg) 70%);
            font-family: "Inter", "Segoe UI", Arial, sans-serif;
            color: var(--ink);
        }

        .soft-input {
            border-color: #d1d5db !important;
            border-radius: 0.5rem !important;
            background: #fff !important;
            font-size: 0.95rem !important;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03) !important;
        }

        .soft-input:focus {
            border-color: #6366f1 !important;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2) !important;
        }
    </style>
</head>

<body class="min-h-screen py-10 px-4">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-5xl tracking-tight font-normal text-slate-900">Low-Res to High-Res Sentinel-2<br>Super-Resolution (SEN2SRLite)</h1>
            <p class="mt-3 text-slate-700 text-xl">Este flujo aumenta la resolucion de Sentinel-2 para generar salidas super-resueltas a 2.5 m.</p>
        </div>

        <!-- Main Container Card -->
        <div class="bg-white border border-slate-200 rounded-2xl shadow-sm p-7 space-y-5">
            <h2 class="text-2xl font-medium text-slate-900">Configuracion</h2>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Columna Izquierda -->
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-800 mb-1.5">Carpeta Input</label>
                        <div class="flex gap-2">
                            <input type="text" id="input_dir" value="./input_10bands_LR"
                                class="soft-input w-full">
                            <button type="button" onclick="loadTifs()"
                                class="px-3 py-2 rounded-lg bg-[var(--primary-soft)] text-[#1a2b6b] hover:bg-[var(--primary-soft-hover)] transition-colors shadow-sm border border-slate-200">
                                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-800 mb-1.5">Carpeta Output</label>
                        <input type="text" id="output_dir" value="./output_10bands_SR"
                            class="soft-input w-full">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-800 mb-1.5">Weights Directory</label>
                        <input type="text" id="weights_dir" value="./SEN2SRLite"
                            class="soft-input w-full">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-800 mb-1.5">Device Mode</label>
                        <div class="flex items-center gap-2">
                            <select id="device_mode"
                                class="soft-input w-full bg-white">
                                <option value="auto">Auto</option>
                                <option value="cuda">CUDA (GPU)</option>
                                <option value="cpu">CPU</option>
                            </select>
                            <span id="gpu_badge"
                                class="inline-flex rounded-md border px-2.5 py-1 text-xs font-medium border-slate-300 bg-slate-50 text-slate-700 whitespace-nowrap hidden"></span>
                        </div>
                    </div>
                </div>

                <!-- Columna Derecha -->
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-800 mb-1.5">Archivo Input</label>
                        <select id="in_tif" onchange="updateOutName()"
                            class="soft-input w-full bg-white">
                            <option value="">Cargando...</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-800 mb-1.5">Archivo Output</label>
                        <input type="text" id="out_name"
                            class="soft-input w-full">
                    </div>

                    <div class="grid grid-cols-2 gap-4 mt-2">
                        <div>
                            <label class="block text-sm font-medium text-slate-800 mb-1.5">Factor</label>
                            <input type="number" id="factor" value="4" min="1" max="8"
                                class="soft-input w-full">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-800 mb-1.5">Patch Size</label>
                            <input type="number" id="patch" value="128" step="16"
                                class="soft-input w-full">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-800 mb-1.5">Padding</label>
                            <input type="number" id="pad" value="4" min="0" max="64"
                                class="soft-input w-full">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-800 mb-1.5">Batch Size</label>
                            <input type="number" id="batch" value="7" min="1" max="64"
                                class="soft-input w-full">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Acciones -->
            <div class="flex items-center gap-3 pt-1">
                <button id="btn_run" onclick="runPipeline()"
                    class="inline-flex justify-center min-w-[108px] px-5 py-2.5 rounded-lg bg-[var(--primary)] text-white text-sm font-medium hover:bg-[var(--primary-hover)] transition-colors shadow-sm items-center gap-2">
                    <i data-lucide="play" class="w-4 h-4"></i> Ejecutar
                </button>
                <button id="btn_cancel" onclick="cancelPipeline()"
                    class="inline-flex justify-center min-w-[108px] px-5 py-2.5 rounded-lg bg-[var(--primary-soft)] text-[#1a2b6b] text-sm font-medium hover:bg-[var(--primary-soft-hover)] transition-colors disabled:opacity-50 disabled:cursor-not-allowed items-center gap-2"
                    disabled>
                    <i data-lucide="x" class="w-4 h-4"></i> Cancelar
                </button>
            </div>

            <!-- Progreso y Terminal -->
            <div id="progress_container" class="space-y-2">
                <div class="flex justify-between text-sm font-medium text-slate-800">
                    <span>Progreso</span>
                    <span id="progress_pct">0%</span>
                </div>
                <div class="w-full h-2.5 bg-slate-200 rounded-full overflow-hidden">
                    <div id="progress_bar" class="h-2.5 w-0 rounded-full transition-all duration-500 bg-gradient-to-r from-[#1a2b6b] to-[#4a7ab5]"></div>
                </div>

                <!-- Badges -->
                <div class="pt-1">
                    <span id="status_badge"
                        class="inline-flex rounded-md border px-2.5 py-1 text-xs font-medium border-slate-300 bg-slate-50 text-slate-700">estado:
                        inactivo</span>
                </div>
            </div>

            <!-- Terminal Log -->
            <div class="border-t border-slate-200 pt-4">
                <div class="bg-[var(--terminal)] rounded-lg p-4 relative">
                <button onclick="clearLogs()" class="absolute top-2 right-2 text-gray-400 hover:text-white transition"
                    title="Clear logs">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
                <div id="terminal" class="h-20 overflow-y-auto text-[#a7f3d0] font-mono text-xs space-y-1 whitespace-pre-wrap break-all">
                    <div class="text-gray-500">> Ready</div>
                </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let eventSource = null;
        const statusEs = {
            idle: "inactivo",
            starting: "iniciando",
            running: "ejecutando",
            completed: "completado",
            cancelled: "cancelado",
            error: "error",
            "connection-lost": "conexion perdida",
        };

        function setStatus(status, className = "") {
            const badge = document.getElementById("status_badge");
            badge.textContent = `estado: ${statusEs[status] || status}`;
            const base = "inline-flex rounded-md border px-2.5 py-1 text-xs font-medium";
            if (!className) {
                badge.className = `${base} border-slate-300 bg-slate-50 text-slate-700`;
                return;
            }
            badge.className = `${base} ${className}`;
        }

        function logToTerminal(msg, type = "normal") {
            const term = document.getElementById("terminal");
            const div = document.createElement("div");
            div.textContent = `> ${msg}`;
            if (type === "error") div.classList.add("text-red-400");
            if (type === "success") div.classList.add("text-green-400");
            term.appendChild(div);
            term.scrollTop = term.scrollHeight;
        }

        function clearLogs() {
            document.getElementById("terminal").innerHTML = '';
            logToTerminal("Logs cleared.");
        }

        async function loadDeviceInfo() {
            try {
                const res = await fetch("/api/device_info");
                const data = await res.json();
                if (data.cuda_available) {
                    const badge = document.getElementById("gpu_badge");
                    badge.textContent = data.gpu_name;
                    badge.classList.remove("hidden");
                    document.getElementById("device_mode").value = "cuda";
                }
            } catch (e) {
                console.error("No se pudo cargar device_info", e);
            }
        }

        async function loadTifs() {
            const folder = document.getElementById('input_dir').value;
            const select = document.getElementById('in_tif');
            select.innerHTML = '<option>Loading...</option>';
            logToTerminal(`Leyendo directorio: ${folder}...`);

            try {
                const res = await fetch(`/api/tifs?folder=${encodeURIComponent(folder)}`);
                const data = await res.json();
                select.innerHTML = '';

                if (data.files && data.files.length > 0) {
                    data.files.forEach(f => {
                        const opt = document.createElement('option');
                        opt.value = f;
                        opt.textContent = f;
                        select.appendChild(opt);
                    });
                    logToTerminal(`Encontrados ${data.files.length} archivos TIFF.`);
                    updateOutName();
                } else {
                    select.innerHTML = '<option value="">Sin archivos .tif</option>';
                    logToTerminal("No se encontraron archivos en la carpeta.", "error");
                }
            } catch (error) {
                select.innerHTML = '<option value="">Error al cargar</option>';
                logToTerminal("Error conectado con el servidor.", "error");
            }
        }

        function updateOutName() {
            const select = document.getElementById('in_tif');
            if (select.value) {
                const filename = select.value;
                // Quitamos la extension
                const stem = filename.substring(0, filename.lastIndexOf('.')) || filename;
                document.getElementById('out_name').value = stem + "_SR.tif";
            }
        }

        function cancelPipeline() {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
                logToTerminal("Pipeline cancelado por el usuario.", "error");
                resetButtons();
            }
        }

        function resetButtons() {
            document.getElementById("btn_run").disabled = false;
            document.getElementById("btn_cancel").disabled = true;
        }

        function runPipeline() {
            const weights_dir = document.getElementById("weights_dir").value;
            const input_dir = document.getElementById("input_dir").value;
            const in_tif_name = document.getElementById("in_tif").value;
            const out_dir = document.getElementById("output_dir").value;
            const out_name = document.getElementById("out_name").value;
            const factor = document.getElementById("factor").value;
            const patch = document.getElementById("patch").value;
            const pad = document.getElementById("pad").value;
            const batch = document.getElementById("batch").value;
            const device = document.getElementById("device_mode").value;

            if (!in_tif_name) {
                logToTerminal("No has seleccionado un archivo de entrada.", "error");
                return;
            }

            // Normalizamos rutas uniendo el dir con el archivo
            // El backend espera el path completo del input
            // Aquí asumimos separador '/' por simplicidad, aunque os.path.join en el backend lo maneja mejor
            const in_tif_path = input_dir.replace(/\/$/, '') + '/' + in_tif_name;

            // Limpiar UI state
            document.getElementById("btn_run").disabled = true;
            document.getElementById("btn_cancel").disabled = false;
            document.getElementById("progress_bar").style.width = "0%";
            document.getElementById("progress_pct").textContent = "0%";
            setStatus("starting", "border-amber-300 bg-amber-100 text-amber-800");

            clearLogs();
            logToTerminal("Iniciando reconstrucción super-resolución...");

            // Construir URL
            const queryParams = new URLSearchParams({
                weights_dir,
                in_tif: in_tif_path,
                out_dir,
                out_name,
                factor,
                patch,
                pad,
                batch,
                device
            });

            const url = `/api/run?${queryParams.toString()}`;

            if (eventSource) eventSource.close();

            eventSource = new EventSource(url);

            eventSource.onmessage = function (e) {
                const data = JSON.parse(e.data);

                if (data.error) {
                    logToTerminal("Error: " + data.error, "error");
                    setStatus("error", "border-red-300 bg-red-100 text-red-800");
                    eventSource.close();
                    resetButtons();
                    return;
                }

                if (data.log) {
                    logToTerminal(data.log);
                }

                if (data.status) {
                    // Actualizar log en caso de que sea un mensaje descriptivo
                    logToTerminal(data.status);
                }

                if (data.progress !== undefined) {
                    const pct = data.progress.toFixed(1);
                    document.getElementById("progress_bar").style.width = pct + "%";
                    document.getElementById("progress_pct").textContent = pct + "%";
                    setStatus("running", "border-blue-300 bg-blue-100 text-blue-800");
                }

                if (data.stage) {
                    if (data.stage === "completed") {
                        setStatus("completed", "border-emerald-300 bg-emerald-100 text-emerald-800");
                        document.getElementById("progress_bar").style.width = "100%";
                        document.getElementById("progress_pct").textContent = "100%";
                        eventSource.close();
                        resetButtons();
                        logToTerminal("Proceso exitoso.", "success");
                    }
                }
            };

            eventSource.onerror = function (e) {
                logToTerminal("Se perdió la conexión con el servidor.", "error");
                setStatus("connection-lost", "border-red-300 bg-red-100 text-red-800");
                eventSource.close();
                resetButtons();
            };
        }

        // Init
        window.addEventListener('DOMContentLoaded', () => {
            loadDeviceInfo();
            loadTifs();
        });
    </script>

</body>

</html>
